services:
  - type: web
    name: mideast-tracker-backend
    env: node
    region: singapore  # Closest to UAE
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
